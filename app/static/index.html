<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Gym Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-24">
<div x-data="gymApp()" x-init="init()" class="max-w-xl mx-auto px-4 py-4">

    <!-- Header -->
    <header class="flex items-center justify-between py-3 mb-2">
        <h1 class="text-2xl font-bold text-slate-800">💪 Gym Tracker</h1>
        <div class="flex items-center gap-3">
            <span class="text-xs text-slate-500" x-text="healthStatus"></span>
            <form method="post" action="/logout" class="m-0">
                <button type="submit"
                        class="text-xs text-slate-500 hover:text-slate-800 underline decoration-dotted">登出</button>
            </form>
        </div>
    </header>

    <!-- Tabs -->
    <nav class="flex gap-1 bg-white p-1 rounded-lg shadow-sm mb-4">
        <template x-for="t in tabs" :key="t.id">
            <button
                @click="switchTab(t.id)"
                :class="activeTab === t.id ? 'bg-blue-600 text-white' : 'text-slate-600 hover:bg-slate-100'"
                class="flex-1 py-2 px-3 rounded-md text-sm font-medium transition"
                x-text="t.label"></button>
        </template>
    </nav>

    <!-- ====== Tab: 記錄 ====== -->
    <section x-show="activeTab === 'log'" x-cloak>
        <!-- 上次同肌群訓練參考 -->
        <template x-if="lastSameGroupWorkout()">
            <div class="bg-amber-50 border border-amber-200 rounded-xl p-3 mb-4">
                <div class="flex items-center justify-between">
                    <div class="text-xs text-amber-800 font-medium">
                        上次同肌群
                        <span class="text-amber-600 font-normal"
                              x-text="'· ' + lastSameGroupWorkout().categories.join('、')"></span>
                    </div>
                    <div class="text-xs text-amber-600"
                         x-text="formatFullDate(lastSameGroupWorkout().workout.date)"></div>
                </div>
                <div class="text-sm text-amber-900 mt-1"
                     x-text="summarizeWorkout(lastSameGroupWorkout().workout)"></div>
            </div>
        </template>

        <div class="flex items-center gap-2 text-xs text-slate-500 mb-3 px-1">
            <span class="font-medium text-slate-700" x-text="todayBanner().date"></span>
            <span class="text-slate-300">·</span>
            <span x-text="todayBanner().weekday"></span>
            <span class="text-slate-300">·</span>
            <span x-text="todayBanner().week"></span>
            <template x-if="isTraining()">
                <span class="ml-auto inline-flex items-center gap-1.5 bg-red-50 text-red-600 px-2 py-0.5 rounded-full">
                    <span class="inline-block w-1.5 h-1.5 rounded-full bg-red-500 animate-pulse"></span>
                    <span>訓練中</span>
                    <span class="font-mono" x-text="elapsedLabel"></span>
                </span>
            </template>
        </div>

        <div class="bg-white rounded-xl shadow-sm p-4 mb-4">
            <h2 class="font-semibold text-slate-700 mb-3">新增一組</h2>

            <label class="block text-xs text-slate-500 mb-1">動作</label>
            <div class="flex flex-wrap gap-1.5 mb-2">
                <button type="button"
                        @click="setCategoryFilter('')"
                        :class="categoryFilter === '' ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-600'"
                        class="text-xs px-2.5 py-1 rounded-full">全部</button>
                <template x-for="c in exerciseCategories()" :key="c">
                    <button type="button"
                            @click="setCategoryFilter(c)"
                            :class="categoryFilter === c ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-600'"
                            class="text-xs px-2.5 py-1 rounded-full"
                            x-text="c"></button>
                </template>
            </div>
            <select x-model="form.exercise_id"
                    class="w-full border border-slate-200 rounded-lg px-3 py-2 text-base">
                <option value="">請選擇...</option>
                <template x-for="ex in filteredExercises()" :key="ex.id">
                    <option :value="ex.id"
                            x-text="ex.equipment ? `${ex.name}(${ex.equipment})` : ex.name"></option>
                </template>
            </select>
            <template x-if="form.exercise_id && lastTimeForExercise(parseInt(form.exercise_id))">
                <div class="mt-2 mb-3 text-xs bg-slate-50 rounded px-3 py-2">
                    <div class="text-slate-400 mb-1">
                        上次
                        <span class="text-slate-600"
                              x-text="lastTimeForExercise(parseInt(form.exercise_id)).dateLabel"></span>
                    </div>
                    <ul class="space-y-0.5">
                        <template x-for="row in lastTimeForExercise(parseInt(form.exercise_id)).rows"
                                  :key="row.n">
                            <li class="flex gap-2 text-slate-700">
                                <span class="text-slate-400 w-6 text-right" x-text="'#' + row.n"></span>
                                <span class="font-mono" x-text="row.text"></span>
                            </li>
                        </template>
                    </ul>
                </div>
            </template>
            <div x-show="!form.exercise_id || !lastTimeForExercise(parseInt(form.exercise_id))" class="mb-3"></div>

            <div class="grid grid-cols-2 gap-2 mb-3">
                <div>
                    <label class="block text-xs text-slate-500 mb-1">重量 (kg)</label>
                    <input type="number" step="0.5" x-model.number="form.weight"
                           class="w-full border border-slate-200 rounded-lg px-3 py-2 text-base">
                </div>
                <div>
                    <label class="block text-xs text-slate-500 mb-1">次數</label>
                    <input type="number" x-model.number="form.reps"
                           class="w-full border border-slate-200 rounded-lg px-3 py-2 text-base">
                </div>
            </div>
            <div class="mb-3">
                <label class="block text-xs text-slate-500 mb-1">備註（選填）</label>
                <input type="text" x-model="form.notes" maxlength="200"
                       placeholder="例：握距稍窄、最後一組力竭"
                       class="w-full border border-slate-200 rounded-lg px-3 py-2 text-base">
            </div>

            <button @click="addSet()"
                    class="w-full bg-blue-600 text-white py-3 rounded-lg font-medium active:bg-blue-700">
                新增這組
            </button>

            <!-- 組間休息計時器：手動「開始 / 停止」控制，與新增組數動作互不影響 -->
            <div class="mt-3 flex items-center gap-3 bg-slate-50 rounded-lg px-3 py-2">
                <div class="text-xs text-slate-500">組間休息</div>
                <div class="flex-1 font-mono text-xl tabular-nums"
                     :class="restTimer.startedAt ? 'text-blue-600' : 'text-slate-400'"
                     x-text="restTimerLabel()"></div>
                <button @click="toggleRestTimer()"
                        class="text-sm px-3 py-1.5 rounded font-medium"
                        :class="restTimer.startedAt ? 'bg-red-100 text-red-600 active:bg-red-200' : 'bg-blue-600 text-white active:bg-blue-700'"
                        x-text="restTimer.startedAt ? '停止' : '開始'"></button>
            </div>
        </div>

        <!-- 今天的訓練 -->
        <div class="bg-white rounded-xl shadow-sm p-4">
            <div class="flex justify-between items-center mb-3">
                <h2 class="font-semibold text-slate-700">今天的訓練</h2>
                <span class="text-xs text-slate-400"
                      x-text="currentWorkout ? `${currentWorkout.sets.length} 組` : '尚未開始'"></span>
            </div>
            <div x-show="!currentWorkout || currentWorkout.sets.length === 0"
                 class="text-sm text-slate-400 text-center py-6">
                還沒有記錄，新增第一組吧！
            </div>
            <template x-if="currentWorkout">
                <ul class="divide-y divide-slate-100" x-ref="setList"
                    x-init="initSortable($refs.setList)">
                    <template x-for="s in currentWorkout.sets" :key="s.id">
                        <li :data-id="s.id"
                            class="py-2 flex justify-between items-center bg-white">
                            <div class="flex items-center gap-2 flex-1">
                                <span class="text-slate-300 select-none cursor-grab touch-none px-1"
                                      title="拖曳排序">⋮⋮</span>
                                <div>
                                    <div class="font-medium text-slate-700"
                                         x-text="exerciseName(s.exercise_id)"></div>
                                    <div class="text-sm text-slate-500">
                                        <span x-text="(s.weight ?? '-') + ' kg × ' + repsLabel(s.reps)"></span>
                                    </div>
                                    <div x-show="s.notes" class="text-xs text-slate-400 mt-0.5 italic"
                                         x-text="s.notes"></div>
                                </div>
                            </div>
                            <button @click="deleteSet(s.id)"
                                    class="text-red-500 text-sm px-2">刪除</button>
                        </li>
                    </template>
                </ul>
            </template>

            <button x-show="isTraining()" @click="endWorkout()"
                    class="w-full mt-4 bg-red-500 text-white py-3 rounded-lg font-medium active:bg-red-600">
                結束訓練
            </button>
        </div>
    </section>

    <!-- ====== Tab: 歷史 ====== -->
    <section x-show="activeTab === 'history'" x-cloak>
        <div class="bg-white rounded-xl shadow-sm p-4">
            <div class="flex items-center justify-between mb-3">
                <h2 class="font-semibold text-slate-700">歷史訓練</h2>
                <div class="flex gap-1 text-xs">
                    <button @click="historyView = 'list'"
                            :class="historyView === 'list' ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-600'"
                            class="px-2.5 py-1 rounded">列表</button>
                    <button @click="historyView = 'calendar'"
                            :class="historyView === 'calendar' ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-600'"
                            class="px-2.5 py-1 rounded">月曆</button>
                </div>
            </div>
            <div x-show="workouts.length === 0" class="text-sm text-slate-400 text-center py-6">
                還沒有任何訓練記錄
            </div>

            <!-- 月曆 view -->
            <div x-show="historyView === 'calendar' && workouts.length > 0" x-cloak>
                <div class="flex items-center justify-between mb-2">
                    <button @click="shiftCalendarMonth(-1)" class="text-slate-500 px-2">‹</button>
                    <div class="font-medium text-slate-700 text-sm" x-text="calendarTitle()"></div>
                    <button @click="shiftCalendarMonth(1)" class="text-slate-500 px-2">›</button>
                </div>
                <div class="grid grid-cols-7 gap-1 text-center text-xs text-slate-400 mb-1">
                    <div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div><div>日</div>
                </div>
                <div class="grid grid-cols-7 gap-1">
                    <template x-for="(day, idx) in calendarDays()" :key="idx">
                        <div class="aspect-square flex flex-col items-center justify-center rounded text-xs"
                             :class="day.inMonth
                                ? (day.count > 0
                                    ? (day.isSelected ? 'bg-blue-600 text-white cursor-pointer' : 'bg-blue-50 text-blue-700 cursor-pointer hover:bg-blue-100')
                                    : 'text-slate-400')
                                : 'text-slate-300'"
                             @click="day.count > 0 && (selectedCalendarDate = day.iso)">
                            <div x-text="day.dayNum"></div>
                            <div x-show="day.count > 0"
                                 class="text-[10px] leading-none mt-0.5"
                                 x-text="day.count + '組'"></div>
                        </div>
                    </template>
                </div>
                <div class="mt-3 flex gap-3 text-xs text-slate-500">
                    <span>本月 <span class="text-slate-700 font-medium" x-text="calendarMonthStats().days"></span> 天訓練</span>
                    <span>共 <span class="text-slate-700 font-medium" x-text="calendarMonthStats().sets"></span> 組</span>
                    <span>總量 <span class="text-slate-700 font-medium" x-text="Math.round(calendarMonthStats().volume)"></span> kg</span>
                </div>

                <!-- 月度分析卡片 -->
                <div x-effect="loadMonthlyAnalytics()"></div>
                <template x-if="monthlyAnalytics && monthlyAnalytics.total_sets > 0">
                    <div class="mt-4 border border-slate-200 rounded-xl p-3 bg-white">
                        <div class="flex items-center justify-between mb-2">
                            <div class="text-sm font-semibold text-slate-700"
                                 x-text="monthlyAnalytics.is_current_month ? '本月進度' : '月結分析'"></div>
                            <span class="text-[10px] px-1.5 py-0.5 rounded"
                                  :class="monthlyAnalytics.is_current_month ? 'bg-amber-50 text-amber-600' : 'bg-emerald-50 text-emerald-600'"
                                  x-text="monthlyAnalytics.is_current_month ? '進行中' : '已結束'"></span>
                        </div>
                        <div class="grid grid-cols-4 gap-2 text-center">
                            <div>
                                <div class="text-lg font-semibold text-slate-700" x-text="monthlyAnalytics.training_days"></div>
                                <div class="text-[10px] text-slate-400">訓練天數</div>
                            </div>
                            <div>
                                <div class="text-lg font-semibold text-slate-700" x-text="monthlyAnalytics.total_sets"></div>
                                <div class="text-[10px] text-slate-400">總組數</div>
                            </div>
                            <div>
                                <div class="text-lg font-semibold text-slate-700" x-text="Math.round(monthlyAnalytics.total_volume)"></div>
                                <div class="text-[10px] text-slate-400">總量 kg</div>
                            </div>
                            <div>
                                <div class="text-lg font-semibold"
                                     :class="monthlyAnalytics.pr_count > 0 ? 'text-amber-600' : 'text-slate-700'"
                                     x-text="monthlyAnalytics.pr_count"></div>
                                <div class="text-[10px] text-slate-400">PR 次數</div>
                            </div>
                        </div>

                        <template x-if="monthlyAnalytics.volume_delta_pct !== null">
                            <div class="mt-3 text-xs text-slate-500">
                                vs 上月總量
                                <span class="font-mono"
                                      :class="monthlyAnalytics.volume_delta_pct >= 0 ? 'text-emerald-600' : 'text-red-500'"
                                      x-text="(monthlyAnalytics.volume_delta_pct >= 0 ? '+' : '') + monthlyAnalytics.volume_delta_pct + '%'"></span>
                                <span class="text-slate-400"
                                      x-text="'（' + Math.round(monthlyAnalytics.prev_month_total_volume) + ' → ' + Math.round(monthlyAnalytics.total_volume) + ' kg）'"></span>
                            </div>
                        </template>

                        <template x-if="monthlyAnalytics.muscle_groups.length > 0">
                            <div class="mt-3">
                                <div class="text-[11px] text-slate-400 mb-1">肌群分布</div>
                                <div class="flex flex-wrap gap-1">
                                    <template x-for="g in monthlyAnalytics.muscle_groups" :key="g.category">
                                        <span class="text-xs px-2 py-0.5 rounded-full bg-slate-100 text-slate-600">
                                            <span x-text="g.category"></span>
                                            <span class="text-slate-400 ml-1" x-text="g.percentage + '%'"></span>
                                        </span>
                                    </template>
                                </div>
                            </div>
                        </template>

                        <template x-if="monthlyAnalytics.top_exercises.length > 0">
                            <div class="mt-3">
                                <div class="text-[11px] text-slate-400 mb-1">常練動作 Top 5</div>
                                <ul class="space-y-0.5 text-xs text-slate-600">
                                    <template x-for="(e, i) in monthlyAnalytics.top_exercises" :key="e.exercise_id">
                                        <li class="flex justify-between">
                                            <span>
                                                <span class="text-slate-400 mr-1" x-text="(i + 1) + '.'"></span>
                                                <span x-text="e.exercise_name"></span>
                                            </span>
                                            <span class="text-slate-400 font-mono"
                                                  x-text="e.sets_count + ' 組 · ' + Math.round(e.total_volume) + ' kg'"></span>
                                        </li>
                                    </template>
                                </ul>
                            </div>
                        </template>

                        <template x-if="monthlyAnalytics.pr_count > 0">
                            <div class="mt-3 text-xs">
                                <span class="text-amber-600 font-medium">🏆 本月 PR：</span>
                                <span class="text-slate-600" x-text="monthlyAnalytics.pr_exercise_names.join('、')"></span>
                            </div>
                        </template>

                        <template x-if="monthlyAnalytics.suggestions && monthlyAnalytics.suggestions.length > 0">
                            <div class="mt-3 pt-3 border-t border-slate-100">
                                <div class="text-[11px] text-slate-400 mb-1.5"
                                     x-text="monthlyAnalytics.is_current_month ? '提醒' : '下月建議'"></div>
                                <ul class="space-y-1.5">
                                    <template x-for="(tip, i) in monthlyAnalytics.suggestions" :key="i">
                                        <li class="flex gap-2 text-xs text-slate-600">
                                            <span class="text-blue-500 flex-shrink-0">•</span>
                                            <span x-text="tip"></span>
                                        </li>
                                    </template>
                                </ul>
                            </div>
                        </template>
                    </div>
                </template>

                <div x-show="selectedCalendarDate" class="mt-3 border-t border-slate-100 pt-2 text-xs text-slate-500">
                    <span x-text="selectedCalendarDate"></span> 的訓練（點其他日期切換）：
                </div>
            </div>

            <ul class="divide-y divide-slate-100"
                :class="historyView === 'calendar' ? 'mt-2' : ''">
                <template x-for="w in visibleWorkouts()" :key="w.id">
                    <li class="py-3">
                        <div @click="toggleExpand(w.id)" class="cursor-pointer">
                            <div class="flex justify-between items-start">
                                <div>
                                    <div class="font-medium text-slate-700"
                                         x-text="formatFullDate(w.date)"></div>
                                    <div class="text-xs text-slate-500 mt-0.5">
                                        <span class="inline-block px-1.5 py-0.5 rounded"
                                              :class="segmentBadgeClass(w.date)"
                                              x-text="timeSegment(w.date)"></span>
                                        <span class="ml-1" x-text="formatTime(w.date)"></span>
                                        <span x-show="w.duration_minutes"
                                              class="ml-1 text-slate-400"
                                              x-text="'· ' + w.duration_minutes + ' 分鐘'"></span>
                                        <span class="ml-2 text-slate-400" x-text="'· ' + weekLabel(w.date)"></span>
                                    </div>
                                </div>
                                <div class="flex items-center gap-2">
                                    <span class="text-sm text-slate-400"
                                          x-text="w.sets.length + ' 組'"></span>
                                    <span class="text-slate-400 text-xs"
                                          x-text="expandedId === w.id ? '▲' : '▼'"></span>
                                </div>
                            </div>
                            <div class="text-sm text-slate-600 mt-2"
                                 x-text="summarizeWorkout(w) || '（無動作）'"></div>
                        </div>

                        <!-- 展開明細 -->
                        <div x-show="expandedId === w.id" x-cloak x-transition
                             class="mt-3 pt-3 border-t border-slate-100">
                            <template x-if="w.sets.length === 0">
                                <div class="text-xs text-slate-400">這次沒有記錄任何組</div>
                            </template>
                            <template x-for="group in groupSetsByExercise(w)" :key="group.exercise_id">
                                <div class="mb-3">
                                    <div class="text-sm font-medium text-slate-700 mb-1"
                                         x-text="group.name"></div>
                                    <ul class="space-y-1">
                                        <template x-for="s in group.sets" :key="s.id">
                                            <li class="text-sm text-slate-600 flex gap-2">
                                                <span class="text-slate-400 w-6"
                                                      x-text="'#' + s.set_number"></span>
                                                <span class="font-mono"
                                                      x-text="(s.weight ?? '-') + ' kg × ' + repsLabel(s.reps)"></span>
                                                <span x-show="s.notes"
                                                      class="text-xs text-slate-400 italic"
                                                      x-text="'— ' + s.notes"></span>
                                            </li>
                                        </template>
                                    </ul>
                                </div>
                            </template>
                            <button @click.stop="deleteWorkout(w.id)"
                                    class="text-red-500 text-xs mt-2">刪除這筆訓練</button>
                        </div>
                    </li>
                </template>
            </ul>
        </div>
    </section>

    <!-- ====== Tab: 動作庫 ====== -->
    <section x-show="activeTab === 'exercises'" x-cloak>
        <div class="bg-white rounded-xl shadow-sm p-4 mb-4">
            <h2 class="font-semibold text-slate-700 mb-3">新增動作</h2>
            <div class="space-y-2">
                <input type="text" x-model="newExercise.name" placeholder="名稱，例：三頭下壓"
                       class="w-full border border-slate-200 rounded-lg px-3 py-2">
                <div class="flex gap-2">
                    <select x-model="newExercise.category"
                            class="flex-1 border border-slate-200 rounded-lg px-3 py-2 bg-white">
                        <option value="">肌群（選填）</option>
                        <template x-for="c in CATEGORY_OPTIONS" :key="c">
                            <option :value="c" x-text="c"></option>
                        </template>
                        <option value="__other__">其他…</option>
                    </select>
                    <select x-model="newExercise.equipment"
                            class="flex-1 border border-slate-200 rounded-lg px-3 py-2 bg-white">
                        <option value="">器材（選填）</option>
                        <template x-for="e in EQUIPMENT_OPTIONS" :key="e">
                            <option :value="e" x-text="e"></option>
                        </template>
                        <option value="__other__">其他…</option>
                    </select>
                </div>
                <div class="flex gap-2">
                    <input x-show="newExercise.category === '__other__'" type="text"
                           x-model="newExercise.categoryCustom" placeholder="自訂肌群"
                           class="flex-1 border border-slate-200 rounded-lg px-3 py-2">
                    <input x-show="newExercise.equipment === '__other__'" type="text"
                           x-model="newExercise.equipmentCustom" placeholder="自訂器材"
                           class="flex-1 border border-slate-200 rounded-lg px-3 py-2">
                </div>
                <button @click="createExercise()"
                        class="w-full bg-blue-600 text-white py-2 rounded-lg">新增動作</button>
            </div>
        </div>

        <!-- 匯出 / 匯入 -->
        <div class="flex gap-2 mb-4">
            <button @click="exportData()"

                            <div class="font-semibold text-slate-700" x-text="analysisModal.minutes + ' 分鐘'"></div>

                        <div class="bg-slate-50 rounded p-2">
                            <div class="text-xs text-slate-400">總組數</div>

                                      class="bg-orange-100 text-orange-700 px-2 py-0.5 rounded"
                                      x-text="'停滯 ' + analysisSummary().stagnant"></span>
                                <span x-show="analysisSummary().below > 0"
                                      class="bg-rose-100 text-rose-700 px-2 py-0.5 rounded"

                        <div class="text-xs text-slate-600 bg-slate-50 rounded p-2 mb-2"

                        <ul class="space-y-2">
                            <template x-for="ea in analysisModal.data.exercises" :key="ea.exercise_id">

                                    <div class="flex items-center justify-between">
                                        <div class="font-medium text-sm text-slate-700" x-text="ea.exercise_name"></div>
                                        <div class="text-xs text-slate-500">

                <button @click="chartModal.metric='estimated_1rm'; renderChart()"

    <!-- 浮動組間休息計時器：開始計時後出現在畫面底部，大字方便放遠看；
         點面板可摺疊/展開；獨立於記錄分頁，切到歷史/動作庫也看得到 -->
    <div x-show="restTimer.startedAt" x-cloak x-transition
         class="fixed inset-x-0 bottom-0 z-40 pointer-events-none">
        <div class="max-w-xl mx-auto px-3 pb-[max(0.75rem,env(safe-area-inset-bottom))] pointer-events-auto">
            <!-- 展開：大字 -->
            <div x-show="!restTimer.minimized"
                 @click.self="restTimer.minimized = true"
                 class="bg-slate-900/95 text-white rounded-2xl shadow-2xl px-5 py-4 flex items-center gap-4 cursor-pointer">
                <div class="flex-1 min-w-0">
                    <div class="text-[10px] uppercase tracking-widest text-slate-400">組間休息</div>
                    <div class="font-mono tabular-nums text-blue-300 leading-none"
                         style="font-size: 3.25rem;"
                         x-text="restTimerLabel()"></div>
                </div>
                <button @click.stop="restTimer.minimized = true"
                        class="text-slate-300 px-3 py-2 rounded-lg active:bg-slate-700 text-sm"
                        title="收合">▾</button>
                <button @click.stop="toggleRestTimer()"
                        class="bg-red-500 active:bg-red-600 text-white font-medium px-4 py-3 rounded-xl">
                    停止
                </button>
            </div>
            <!-- 摺疊：小條 -->
            <div x-show="restTimer.minimized"
                 @click.self="restTimer.minimized = false"
                 class="bg-slate-900/95 text-white rounded-full shadow-xl px-4 py-2 flex items-center gap-3 cursor-pointer w-fit ml-auto">
                <span class="text-xs text-slate-400">休息</span>
                <span class="font-mono tabular-nums text-blue-300 text-lg"
                      x-text="restTimerLabel()"></span>
                <button @click.stop="toggleRestTimer()"
                        class="text-red-400 active:text-red-300 text-xs px-2 py-1">停止</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div x-show="toast.show" x-cloak x-transition
         class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-4 py-2 rounded-lg shadow-lg text-sm z-50"
         x-text="toast.msg"></div>
</div>

<script>
    function gymApp() {
        return {
            activeTab: 'log',
            tabs: [
                {id: 'log', label: '記錄'},
                {id: 'history', label: '歷史'},
                {id: 'exercises', label: '動作庫'},
            ],
            healthStatus: '連線中...',
            exercises: [],
            workouts: [],
            exercisePRs: {},   // exercise_id -> ExercisePR
            chartModal: {show: false, exerciseId: null, exerciseName: '', history: [], metric: 'max_weight', chart: null},
            analysisModal: {show: false, minutes: 0, data: null},
            historyView: 'list',                      // 'list' | 'calendar'
            calendarMonth: new Date(new Date().getFullYear(), new Date().getMonth(), 1),
            selectedCalendarDate: null,               // 'YYYY-MM-DD' 或 null（代表看當月全部）
            monthlyAnalytics: null,                   // 當前月曆月份的分析資料
            monthlyAnalyticsLoading: false,
            currentWorkout: null,
            form: {exercise_id: '', weight: null, reps: null, notes: ''},
            categoryFilter: '',  // '' = 全部；否則顯示該肌群/部位的動作
            newExercise: {name: '', category: '', equipment: '', categoryCustom: '', equipmentCustom: ''},
            CATEGORY_OPTIONS: ['胸', '背', '腿', '肩', '手臂', '核心', '有氧', '全身'],
            EQUIPMENT_OPTIONS: ['槓鈴', '啞鈴', '器械', 'Cable', '自重', '彈力帶', '壺鈴'],
            toast: {show: false, msg: ''},
            expandedId: null,
            nowTick: Date.now(),  // 每秒更新一次，讓計時器重繪
            // 組間休息計時器
            //   startedAt: null = 未開始；數字為起始 timestamp
            //   minimized: 浮動面板是否摺疊成小條
            //   _wakeLock: 螢幕保持喚醒的 lock 實例（不需 reactive，故底線開頭）
            restTimer: {startedAt: null, minimized: false, _wakeLock: null},

            async init() {
                await this.checkHealth();
                await this.loadExercises();
                await this.loadWorkouts();
                await this.ensureTodayWorkout();
                setInterval(() => { this.nowTick = Date.now(); }, 1000);
                // 從背景切回前景時，若計時器仍在跑就重新拿 wake lock
                // （瀏覽器在 visibility=hidden 時會自動釋放）
                document.addEventListener('visibilitychange', () => {
                    if (document.visibilityState === 'visible' && this.restTimer.startedAt) {
                        this.acquireWakeLock();
                    }
                });
            },

            isTraining() {
                return this.currentWorkout
                    && this.currentWorkout.sets.length > 0
                    && this.currentWorkout.duration_minutes == null;
            },

            get elapsedLabel() {
                if (!this.currentWorkout) return '00:00';
                // 觸發 nowTick 依賴
                const _ = this.nowTick;
                const start = this.parseServerDate(this.currentWorkout.date).getTime();
                const sec = Math.max(0, Math.floor((Date.now() - start) / 1000));
                const h = Math.floor(sec / 3600);
                const m = Math.floor((sec % 3600) / 60);
                const s = sec % 60;
                const pad = n => String(n).padStart(2, '0');
                return h > 0 ? `${h}:${pad(m)}:${pad(s)}` : `${pad(m)}:${pad(s)}`;
            },

            toggleRestTimer() {
                if (this.restTimer.startedAt) {
                    this.restTimer.startedAt = null;
                    this.restTimer.minimized = false;
                    this.releaseWakeLock();
                } else {
                    this.restTimer.startedAt = Date.now();
                    this.restTimer.minimized = false;
                    this.acquireWakeLock();
                }
            },

            async acquireWakeLock() {
                // Wake Lock API：iOS Safari 16.4+、Android Chrome 都支援；不支援也不會壞
                if (!('wakeLock' in navigator)) return;
                try {
                    if (this.restTimer._wakeLock) return;
                    this.restTimer._wakeLock = await navigator.wakeLock.request('screen');
                    this.restTimer._wakeLock.addEventListener('release', () => {
                        this.restTimer._wakeLock = null;
                    });
                } catch (e) {
                    // 拿不到不影響計時功能，靜默忽略
                }
            },

            releaseWakeLock() {
                if (this.restTimer._wakeLock) {
                    this.restTimer._wakeLock.release().catch(() => {});
                    this.restTimer._wakeLock = null;
                }
            },

            restTimerLabel() {
                void this.nowTick;  // 依賴 nowTick 讓 Alpine 每秒重繪
                if (!this.restTimer.startedAt) return '00:00';
                const sec = Math.max(0, Math.floor((Date.now() - this.restTimer.startedAt) / 1000));
                const m = Math.floor(sec / 60);
                const s = sec % 60;
                const pad = n => String(n).padStart(2, '0');
                return `${pad(m)}:${pad(s)}`;
            },

            initSortable(el) {
                if (!window.Sortable || el._sortable) return;
                el._sortable = Sortable.create(el, {
                    animation: 150,
                    handle: '.cursor-grab',
                    delay: 150,           // 長按 150ms 才啟動拖曳，避免和點擊衝突
                    delayOnTouchOnly: true,
                    onEnd: async (evt) => {
                        if (evt.oldIndex === evt.newIndex) return;
                        if (!this.currentWorkout) return;
                        const ids = Array.from(el.querySelectorAll('li[data-id]'))
                            .map(li => parseInt(li.dataset.id));
                        const backup = [...this.currentWorkout.sets];
                        // 樂觀更新
                        const byId = new Map(backup.map(s => [s.id, s]));
                        this.currentWorkout.sets = ids
                            .map((id, i) => ({...byId.get(id), set_number: i + 1}));
                        try {
                            const updated = await this.api('POST',
                                `/workouts/${this.currentWorkout.id}/sets/reorder`,
                                {set_ids: ids});
                            this.currentWorkout = updated;
                            this.showToast('已更新順序');
                        } catch (e) {
                            this.currentWorkout.sets = backup;
                            this.showToast('排序失敗：' + e.message);
                        }
                    },
                });
            },

            toggleExpand(id) {
                this.expandedId = this.expandedId === id ? null : id;
            },

            groupSetsByExercise(w) {
                const groups = new Map();
                for (const s of w.sets) {
                    if (!groups.has(s.exercise_id)) {
                        groups.set(s.exercise_id, {
                            exercise_id: s.exercise_id,
                            name: this.exerciseName(s.exercise_id),
                            sets: [],
                        });
                    }
                    groups.get(s.exercise_id).sets.push(s);
                }
                return Array.from(groups.values());
            },

            async endWorkout() {
                if (!this.currentWorkout) return;
                const start = this.parseServerDate(this.currentWorkout.date).getTime();
                const minutes = Math.max(1, Math.round((Date.now() - start) / 60000));
                try {
                    // 先寫入訓練時長，分析才能看到
                    await this.api('PATCH',
                        `/workouts/${this.currentWorkout.id}`,
                        {duration_minutes: minutes});
                    const analysis = await this.api('GET',
                        `/workouts/${this.currentWorkout.id}/analysis`);
                    this.analysisModal = {show: true, minutes, data: analysis};
                } catch (e) {
                    this.showToast('錯誤：' + e.message);
                }
            },

            async confirmEndWorkout() {
                this.analysisModal.show = false;
                this.currentWorkout = null;
                this.restTimer.startedAt = null;
                this.restTimer.minimized = false;
                this.releaseWakeLock();
                await this.loadWorkouts();
                this.showToast('訓練已結束');
            },

            volumeDeltaLabel(pct) {
                if (pct == null) return '—';
                const sign = pct >= 0 ? '+' : '';
                return `${sign}${pct}%`;
            },

            analysisSummary() {
                const data = this.analysisModal.data;
                if (!data) return {pr: 0, stagnant: 0, below: 0, total: 0};
                let pr = 0, stagnant = 0, below = 0;
                for (const e of data.exercises) {
                    if (e.is_pr) pr++;
                    else if (e.is_stagnant) stagnant++;
                    else if (e.is_below_recent) below++;
                }
                return {pr, stagnant, below, total: data.exercises.length};
            },

            // ===== 月曆 view =====
            _toLocalISO(d) {
                const y = d.getFullYear();
                const m = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                return `${y}-${m}-${day}`;
            },

            shiftCalendarMonth(delta) {
                const d = this.calendarMonth;
                this.calendarMonth = new Date(d.getFullYear(), d.getMonth() + delta, 1);
                this.selectedCalendarDate = null;
            },

            async loadMonthlyAnalytics() {
                // 由 x-effect 呼叫：calendarMonth / historyView / workouts 變動時自動觸發。
                if (this.historyView !== 'calendar') return;
                // 讀取 workouts.length 讓 x-effect 在新增/刪除訓練後重算
                void this.workouts.length;
                const year = this.calendarMonth.getFullYear();
                const month = this.calendarMonth.getMonth() + 1;
                const key = `${year}-${month}`;
                if (this._monthlyAnalyticsKey === key && this.monthlyAnalyticsLoading) return;
                this._monthlyAnalyticsKey = key;
                this.monthlyAnalyticsLoading = true;
                try {
                    this.monthlyAnalytics = await this.api(
                        'GET', `/analytics/monthly?year=${year}&month=${month}`);
                } catch (e) {
                    this.monthlyAnalytics = null;
                } finally {
                    this.monthlyAnalyticsLoading = false;
                }
            },

            calendarTitle() {
                const d = this.calendarMonth;
                return `${d.getFullYear()} 年 ${d.getMonth() + 1} 月`;
            },

            calendarDays() {
                const year = this.calendarMonth.getFullYear();
                const month = this.calendarMonth.getMonth();
                // 週一起算（getDay: 日=0, 一=1… 六=6）；調成 一=0
                const firstDay = new Date(year, month, 1);
                const leading = (firstDay.getDay() + 6) % 7;
                const daysInMonth = new Date(year, month + 1, 0).getDate();

                // workout 計數：以本地日期歸戶
                const countByIso = {};
                for (const w of this.workouts) {
                    const iso = this._toLocalISO(this.parseServerDate(w.date));
                    countByIso[iso] = (countByIso[iso] || 0) + w.sets.length;
                }

                const cells = [];
                // 前導空白（顯示上月日期）
                for (let i = leading - 1; i >= 0; i--) {
                    const d = new Date(year, month, -i);
                    cells.push({inMonth: false, dayNum: d.getDate(), iso: this._toLocalISO(d), count: 0, isSelected: false});
                }
                // 本月
                for (let dayNum = 1; dayNum <= daysInMonth; dayNum++) {
                    const d = new Date(year, month, dayNum);
                    const iso = this._toLocalISO(d);
                    cells.push({
                        inMonth: true,
                        dayNum,
                        iso,
                        count: countByIso[iso] || 0,
                        isSelected: this.selectedCalendarDate === iso,
                    });
                }
                // 補到 6 x 7 = 42 格
                while (cells.length % 7 !== 0 || cells.length < 42) {
                    const nextIdx = cells.length - leading - daysInMonth + 1;
                    const d = new Date(year, month + 1, nextIdx);
                    cells.push({inMonth: false, dayNum: d.getDate(), iso: this._toLocalISO(d), count: 0, isSelected: false});
                    if (cells.length >= 42) break;
                }
                return cells;
            },

            calendarMonthStats() {
                const year = this.calendarMonth.getFullYear();
                const month = this.calendarMonth.getMonth();
                const days = new Set();
                let sets = 0, volume = 0;
                for (const w of this.workouts) {
                    const d = this.parseServerDate(w.date);
                    if (d.getFullYear() !== year || d.getMonth() !== month) continue;
                    days.add(this._toLocalISO(d));
                    sets += w.sets.length;
                    for (const s of w.sets) {
                        if (s.weight != null && s.reps != null) volume += s.weight * s.reps;
                    }
                }
                return {days: days.size, sets, volume};
            },

            visibleWorkouts() {
                if (this.historyView !== 'calendar') return this.workouts;
                const year = this.calendarMonth.getFullYear();
                const month = this.calendarMonth.getMonth();
                return this.workouts.filter(w => {
                    const d = this.parseServerDate(w.date);
                    if (d.getFullYear() !== year || d.getMonth() !== month) return false;
                    if (this.selectedCalendarDate) {
                        return this._toLocalISO(d) === this.selectedCalendarDate;
                    }
                    return true;
                });
            },

            analysisHeadline() {
                const data = this.analysisModal.data;
                if (!data) return '';
                const {pr, stagnant, below, total} = this.analysisSummary();
                const parts = [];
                const delta = data.volume_delta_pct;
                if (delta != null) {
                    if (delta >= 10) parts.push(`訓練量比上次同肌群多 ${delta}%，狀態不錯`);
                    else if (delta <= -10) parts.push(`訓練量比上次同肌群少 ${Math.abs(delta)}%，可能疲勞了`);
                    else parts.push(`訓練量與上次同肌群相當（${this.volumeDeltaLabel(delta)}）`);
                }
                if (pr > 0) parts.push(`${pr} 個動作突破 PR 🎉`);
                if (stagnant > 0) parts.push(`${stagnant} 個動作停滯，可考慮加重`);
                if (below > 0) parts.push(`${below} 個動作表現低於近期水準`);
                if (parts.length === 0 && total > 0) {
                    parts.push('本次沒有特別的進退步訊號，持續累積。');
                }
                return parts.join('；');
            },

            async deleteWorkout(id) {
                if (!confirm('確定刪除這次訓練？所有組都會消失。')) return;
                try {
                    await this.api('DELETE', `/workouts/${id}`);
                    if (this.expandedId === id) this.expandedId = null;
                    await this.loadWorkouts();
                    this.showToast('已刪除');
                } catch (e) {
                    this.showToast('錯誤：' + e.message);
                }
            },

            async api(method, path, body) {
                const opts = {method, headers: {'Content-Type': 'application/json'}};
                if (body) opts.body = JSON.stringify(body);
                const res = await fetch('/api' + path, opts);
                if (!res.ok) {
                    const err = await res.json().catch(() => ({detail: res.statusText}));
                    throw new Error(err.detail || 'Request failed');
                }
                if (res.status === 204) return null;
                return res.json();
            },

            showToast(msg) {
                this.toast = {show: true, msg};
                setTimeout(() => this.toast.show = false, 2000);
            },

            async checkHealth() {
                try {
                    await this.api('GET', '/health');
                    this.healthStatus = '✅ 已連線';
                } catch {
                    this.healthStatus = '❌ 連線失敗';
                }
            },

            switchTab(id) {
                this.activeTab = id;
                if (id === 'exercises') this.loadExercisePRs();
            },

            async loadExercises() {
                this.exercises = await this.api('GET', '/exercises');
            },

            async loadExercisePRs() {
                if (!this.exercises.length) return;
                const results = await Promise.all(
                    this.exercises.map(ex =>
                        this.api('GET', `/exercises/${ex.id}/prs`).catch(() => null)
                    )
                );
                const prs = {};
                results.forEach((pr, i) => {
                    if (pr) prs[this.exercises[i].id] = pr;
                });
                this.exercisePRs = prs;
            },

            async openChart(ex) {
                this.chartModal = {show: true, exerciseId: ex.id, exerciseName: ex.name, history: [], metric: 'max_weight', chart: null};
                try {
                    this.chartModal.history = await this.api('GET', `/exercises/${ex.id}/history`);
                    // Alpine x-if 插入 canvas 後，還要等一個 paint frame 才有尺寸
                    await this.$nextTick();
                    await new Promise(r => setTimeout(r, 30));
                    this.renderChart();
                } catch (e) {
                    this.showToast('無法載入歷史資料');
                }
            },

            closeChart() {
                if (this.chartModal.chart) {
                    this.chartModal.chart.destroy();
                    this.chartModal.chart = null;
                }
                this.chartModal.show = false;
            },

            renderChart() {
                const canvas = document.getElementById('gymChart');
                if (!canvas || !this.chartModal.history.length) return;

                const epley = (w, r) => (w != null && r != null && r > 0) ? +(w * (1 + r / 30)).toFixed(1) : null;
                const metric = this.chartModal.metric;
                const data = this.chartModal.history;
                const labels = data.map(p => p.date.substring(0, 10));
                const values = data.map(p => {
                    if (metric === 'max_weight') return p.max_weight;
                    if (metric === 'total_volume') return p.total_volume;
                    if (metric === 'estimated_1rm') return epley(p.max_weight, p.max_weight_reps);
                    return null;
                });
                const metricLabels = {
                    max_weight: '最大重量 (kg)',
                    total_volume: '總訓練量 (kg)',
                    estimated_1rm: '推估 1RM (kg)',
                };

                // 切換指標時：若 canvas 上已有同一個 chart 實例，就地更新資料避免 ctx race。
                const existing = Chart.getChart(canvas);
                if (existing) {
                    existing.data.labels = labels;
                    existing.data.datasets[0].data = values;
                    existing.data.datasets[0].label = metricLabels[metric];
                    existing.update();
                    this.chartModal.chart = existing;
                    return;
                }

                this.chartModal.chart = new Chart(canvas, {
                    type: 'line',
                    data: {
                        labels,
                        datasets: [{
                            label: metricLabels[metric],
                            data: values,
                            borderColor: '#2563eb',
                            backgroundColor: 'rgba(37,99,235,0.08)',
                            tension: 0.3,
                            fill: true,
                            spanGaps: true,
                            pointRadius: 4,
                        }],
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        animation: false,
                        plugins: {legend: {display: false}},
                        scales: {
                            x: {ticks: {maxRotation: 45, maxTicksLimit: 8}},
                            y: {beginAtZero: false},
                        },
                    },
                });
            },

            async exportData() {
                try {
                    const data = await this.api('GET', '/export');
                    const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `gym-tracker-${new Date().toISOString().substring(0, 10)}.json`;
                    a.click();
                    URL.revokeObjectURL(url);
                    this.showToast('已匯出');
                } catch (e) {
                    this.showToast('匯出失敗：' + e.message);
                }
            },

            async importData(event) {
                const file = event.target.files[0];
                if (!file) return;
                try {
                    const text = await file.text();
                    const data = JSON.parse(text);
                    const result = await this.api('POST', '/import', data);
                    const s = result.imported;
                    this.showToast(`匯入完成：${s.exercises} 動作、${s.workouts} 訓練、${s.routines} 課表`);
                    await this.loadExercises();
                    await this.loadWorkouts();
                    await this.loadExercisePRs();
                } catch (e) {
                    this.showToast('匯入失敗：' + e.message);
                }
                event.target.value = '';
            },

            async loadWorkouts() {
                this.workouts = await this.api('GET', '/workouts');
            },

            async ensureTodayWorkout() {
                // 只「接續」還沒結束的訓練（duration_minutes 為 null）
                // 已結束的訓練即使是今天也不接續，讓使用者能一天多次訓練
                const inProgress = this.workouts.find(w => w.duration_minutes == null);
                if (inProgress) this.currentWorkout = inProgress;
            },

            exerciseCategory(id) {
                const ex = this.exercises.find(e => e.id === id);
                return ex?.category || null;
            },

            exerciseCategories() {
                const cats = new Set();
                for (const ex of this.exercises) {
                    if (ex.category) cats.add(ex.category);
                }
                return [...cats].sort();
            },

            filteredExercises() {
                if (!this.categoryFilter) return this.exercises;
                return this.exercises.filter(e => e.category === this.categoryFilter);
            },

            setCategoryFilter(c) {
                this.categoryFilter = c;
                // 若目前選的動作不在新過濾條件內，清空選擇
                if (this.form.exercise_id) {
                    const ex = this.exercises.find(e => e.id === parseInt(this.form.exercise_id));
                    if (ex && c && ex.category !== c) this.form.exercise_id = '';
                }
            },

            workoutCategories(w) {
                const cats = new Set();
                for (const s of (w.sets || [])) {
                    const c = this.exerciseCategory(s.exercise_id);
                    if (c) cats.add(c);
                }
                return cats;
            },

            lastTimeForExercise(exerciseId) {
                // 找最近一筆（不含今天進行中的 currentWorkout）含有此動作的 workout
                for (const w of this.workouts) {
                    if (this.currentWorkout && w.id === this.currentWorkout.id) continue;
                    const sets = w.sets.filter(s => s.exercise_id === exerciseId);
                    if (sets.length === 0) continue;
                    sets.sort((a, b) => a.set_number - b.set_number);
                    const rows = sets.map(s => {
                        const weight = s.weight == null ? '-' : s.weight;
                        const reps = (s.reps == null || s.reps === '') ? '力竭' : `${s.reps} 下`;
                        return {n: s.set_number, text: `${weight} kg × ${reps}`};
                    });
                    const d = this.parseServerDate(w.date);
                    const dateLabel = `${d.getMonth() + 1}/${d.getDate()}`;
                    return {dateLabel, rows};
                }
                return null;
            },

            lastSameGroupWorkout() {
                if (!this.currentWorkout) return null;
                const currentCats = this.workoutCategories(this.currentWorkout);
                if (currentCats.size === 0) return null;
                for (const w of this.workouts) {
                    if (w.id === this.currentWorkout.id) continue;
                    if (w.duration_minutes == null) continue;  // 未結束的不算
                    const cats = this.workoutCategories(w);
                    const overlap = [...cats].filter(c => currentCats.has(c));
                    if (overlap.length > 0) {
                        return {workout: w, categories: overlap};
                    }
                }
                return null;
            },

            parseServerDate(iso) {
                // 後端用 datetime.utcnow() 存 naive UTC，序列化不帶 Z。
                // 這裡補上 Z 讓 JS 當成 UTC，才會正確轉成本機時間。
                if (!iso) return new Date();
                if (/[Zz]|[+-]\d\d:?\d\d$/.test(iso)) return new Date(iso);
                return new Date(iso + 'Z');
            },

            repsLabel(reps) {
                return (reps == null || reps === '') ? '力竭' : `${reps} 下`;
            },

            exerciseName(id) {
                const ex = this.exercises.find(e => e.id === id);
                if (!ex) return '未知動作';
                return ex.equipment ? `${ex.name}(${ex.equipment})` : ex.name;
            },

            async addSet() {
                if (!this.form.exercise_id) {
                    this.showToast('請選擇動作');
                    return;
                }
                if (this.form.weight === '' || this.form.weight == null || Number.isNaN(this.form.weight)) {
                    this.showToast('請填入重量');
                    return;
                }

                try {
                    // 沒有當前 workout 就先建一個
                    if (!this.currentWorkout) {
                        this.currentWorkout = await this.api('POST', '/workouts', {sets: []});
                        this.currentWorkout.sets = [];
                    }

                    // 計算這個動作是第幾組
                    const sameExerciseSets = this.currentWorkout.sets.filter(
                        s => s.exercise_id === parseInt(this.form.exercise_id)
                    );

                    const toNum = v => (v === '' || v == null || Number.isNaN(v)) ? null : v;
                    const newSet = await this.api(
                        'POST',
                        `/workouts/${this.currentWorkout.id}/sets`,
                        {
                            exercise_id: parseInt(this.form.exercise_id),
                            set_number: sameExerciseSets.length + 1,
                            weight: toNum(this.form.weight),
                            reps: toNum(this.form.reps),
                            notes: this.form.notes || null,
                        }
                    );

                    this.currentWorkout.sets.push(newSet);
                    this.showToast('已記錄 ✓');
                    await this.loadWorkouts();
                } catch (e) {
                    this.showToast('錯誤：' + e.message);
                }
            },

            async deleteSet(setId) {
                try {
                    await this.api('DELETE', `/workouts/${this.currentWorkout.id}/sets/${setId}`);
                    this.currentWorkout.sets = this.currentWorkout.sets.filter(s => s.id !== setId);
                    this.showToast('已刪除');
                } catch (e) {
                    this.showToast('錯誤：' + e.message);
                }
            },

            async createExercise() {
                if (!this.newExercise.name) return;
                const ne = this.newExercise;
                const payload = {
                    name: ne.name,
                    category: ne.category === '__other__' ? (ne.categoryCustom || null) : (ne.category || null),
                    equipment: ne.equipment === '__other__' ? (ne.equipmentCustom || null) : (ne.equipment || null),
                };
                try {
                    await this.api('POST', '/exercises', payload);
                    this.newExercise = {name: '', category: '', equipment: '', categoryCustom: '', equipmentCustom: ''};
                    await this.loadExercises();
                    this.showToast('已新增動作');
                } catch (e) {
                    this.showToast('錯誤：' + e.message);
                }
            },

            async deleteExercise(id) {
                if (!confirm('確定要刪除這個動作？相關記錄都會不見。')) return;
                try {
                    await this.api('DELETE', `/exercises/${id}`);
                    await this.loadExercises();
                    this.showToast('已刪除');
                } catch (e) {
                    this.showToast('錯誤：' + e.message);
                }
            },

            formatDate(iso) {
                const d = this.parseServerDate(iso);
                const today = new Date();
                const isToday = d.toDateString() === today.toDateString();
                if (isToday) return '今天 ' + d.toLocaleTimeString('zh-TW', {
                    hour: '2-digit',
                    minute: '2-digit'
                });
                return d.toLocaleDateString('zh-TW');
            },

            formatFullDate(iso) {
                const d = this.parseServerDate(iso);
                const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
                const y = d.getFullYear();
                const m = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                const today = new Date();
                const prefix = d.toDateString() === today.toDateString() ? '今天 · ' : '';
                return `${prefix}${y}/${m}/${day} (週${weekdays[d.getDay()]})`;
            },

            isoWeek(date) {
                // ISO 8601 週數計算：週一為一週開始，含該年第一個週四的那週為第 1 週
                const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
                const dayNum = d.getUTCDay() || 7;
                d.setUTCDate(d.getUTCDate() + 4 - dayNum);
                const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
                const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
                return {year: d.getUTCFullYear(), week: weekNo};
            },

            weekLabel(iso) {
                const {year, week} = this.isoWeek(this.parseServerDate(iso));
                return `${year} 第 ${week} 週`;
            },

            timeSegment(iso) {
                const h = this.parseServerDate(iso).getHours();
                if (h < 5) return '深夜';
                if (h < 11) return '早上';
                if (h < 14) return '中午';
                if (h < 18) return '下午';
                if (h < 22) return '晚上';
                return '深夜';
            },

            segmentBadgeClass(iso) {
                const seg = this.timeSegment(iso);
                return {
                    '早上': 'bg-amber-100 text-amber-700',
                    '中午': 'bg-orange-100 text-orange-700',
                    '下午': 'bg-sky-100 text-sky-700',
                    '晚上': 'bg-indigo-100 text-indigo-700',
                    '深夜': 'bg-slate-200 text-slate-600',
                }[seg] || 'bg-slate-100 text-slate-600';
            },

            formatTime(iso) {
                return this.parseServerDate(iso).toLocaleTimeString('zh-TW', {
                    hour: '2-digit', minute: '2-digit', hour12: false,
                });
            },

            todayBanner() {
                const now = new Date();
                const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
                const y = now.getFullYear();
                const m = String(now.getMonth() + 1).padStart(2, '0');
                const d = String(now.getDate()).padStart(2, '0');
                const isoNow = now.toISOString();
                return {
                    date: `${y}/${m}/${d}`,
                    weekday: weekdays[now.getDay()],
                    week: this.weekLabel(isoNow),
                    segment: this.timeSegment(isoNow),
                    time: this.formatTime(isoNow),
                };
            },

            summarizeWorkout(w) {
                if (!w.sets.length) return '無記錄';
                const byExercise = {};
                w.sets.forEach(s => {
                    const name = this.exerciseName(s.exercise_id);
                    byExercise[name] = (byExercise[name] || 0) + 1;
                });
                return Object.entries(byExercise)
                    .map(([n, c]) => `${n} × ${c}`)
                    .join('、');
            },
        }
    }
</script>
